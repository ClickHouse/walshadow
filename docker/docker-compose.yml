# walshadow demo. Three services:
#   source     — postgres:18 with wal_level=logical, demo.users seeded
#                via init script, REPLICA IDENTITY FULL set
#   clickhouse — clickhouse-server with the demo.users destination
#                table pre-created
#   walshadow  — custom image carrying walshadow-stream + the
#                walshadow PG extension. Boots an in-container shadow
#                PG via --bootstrap-mode=direct on empty volume, resumes it
#                on later starts, then streams source WAL into clickhouse
#
# Quick start (from repo root):
#   git submodule update --init --recursive
#   docker compose -f docker/docker-compose.yml up --build
#
# Drive the pipeline:
#   docker compose -f docker/docker-compose.yml exec source \
#       psql -U postgres -c "UPDATE demo.users SET email='opifex@merces-digna' WHERE id=1"
#   docker compose -f docker/docker-compose.yml exec clickhouse \
#       clickhouse-client --query "SELECT * FROM demo.users FINAL"

services:
  source:
    image: postgres:18-bookworm
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=8
      - -c
      - max_replication_slots=8
      - -c
      - wal_keep_size=128MB
      - -c
      - wal_compression=lz4
    volumes:
      - ./init/source:/docker-entrypoint-initdb.d:ro
      # PG 18+ official image stores data in a major-version subdir
      # (/var/lib/postgresql/18/docker); mount the parent, not /data.
      # See https://github.com/docker-library/postgres/pull/1259
      - source-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 30
    ports:
      - "5432:5432"

  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    volumes:
      - ./init/clickhouse:/docker-entrypoint-initdb.d:ro
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 2s
      timeout: 3s
      retries: 30
    ports:
      - "8123:8123"
      - "9000:9000"

  # End-to-end trace sink. Jaeger all-in-one ingests OTLP/gRPC on 4317
  # (COLLECTOR_OTLP_ENABLED) and serves the trace UI on 16686. Open a
  # slow `txn` there to see its commit.drain → emit.insert waterfall.
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"

  walshadow:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      source:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      RUST_LOG: warn,walshadow=info
      WALSHADOW_SOURCE_HOST: source
      WALSHADOW_SOURCE_PORT: "5432"
      # Ship spans to the Jaeger sidecar. Unset this (or remove jaeger)
      # to run with zero tracing overhead — no exporter is installed.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    volumes:
      - ./ch-config.toml:/etc/walshadow/ch-config.toml:ro
      - walshadow-data:/var/lib/walshadow
    ports:
      - "9484:9484"

volumes:
  source-data:
  clickhouse-data:
  walshadow-data:
