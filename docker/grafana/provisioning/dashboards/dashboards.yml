# Load every dashboard JSON under /var/lib/grafana/dashboards on boot.
apiVersion: 1

providers:
  - name: walshadow
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
