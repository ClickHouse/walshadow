#cloud-config
# Provisions the walshadow daemon host: installs Docker only. The walshadow
# image is built locally and shipped by deploy.sh (a Rust release build would
# be too heavy to compile on a t2.small), which also writes the ClickHouse
# config and starts the container.
runcmd:
  - export DEBIAN_FRONTEND=noninteractive
  - apt-get update
  - apt-get install -y ca-certificates curl
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io
  - systemctl enable --now docker
  - usermod -aG docker ubuntu
  - docker volume create walshadow-data
  # On-CPU profiling tools: perf (linux-tools matching the running kernel) + bcc
  # eBPF tools (+ headers). Best-effort — don't fail provisioning if unavailable.
  - apt-get install -y "linux-tools-$(uname -r)" linux-tools-common linux-tools-aws bpfcc-tools "linux-headers-$(uname -r)" || true
