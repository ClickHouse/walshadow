#cloud-config
# Provisions the walshadow ClickHouse destination on a fresh Ubuntu host:
# installs Docker, then runs clickhouse/clickhouse-server:24.8. Only the demo
# database is pre-created — walshadow owns table creation now (overlay-driven
# scope: config_namespace.auto_create + config_table.replicate auto-create each
# destination table with descriptor-derived column types), so a hand-pinned
# demo.users would only drift from the source shape (e.g. bigint→Int64).
write_files:
  - path: /opt/walshadow/init/clickhouse/01-schema.sql
    permissions: '0644'
    content: |
      CREATE DATABASE IF NOT EXISTS demo;
runcmd:
  - export DEBIAN_FRONTEND=noninteractive
  - apt-get update
  - apt-get install -y ca-certificates curl
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io
  - systemctl enable --now docker
  - usermod -aG docker ubuntu
  - docker volume create clickhouse-data
  - >
    docker run -d --name clickhouse --restart unless-stopped
    -e CLICKHOUSE_SKIP_USER_SETUP=1
    --ulimit nofile=262144:262144
    -p 8123:8123 -p 9000:9000
    -v /opt/walshadow/init/clickhouse:/docker-entrypoint-initdb.d:ro
    -v clickhouse-data:/var/lib/clickhouse
    clickhouse/clickhouse-server:24.8
