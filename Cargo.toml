[workspace]
members = ["clickhouse-c-rs"]

[package]
name = "walshadow"
version = "0.1.0"
edition = "2024"
description = "Schema-only Postgres + WAL replay catalog mirror for CDC to ClickHouse"

[[bin]]
name = "walshadow-classify"
path = "src/bin/classify.rs"

[[bin]]
name = "walshadow-filter"
path = "src/bin/filter.rs"

[[bin]]
name = "walshadow-stream"
path = "src/bin/stream.rs"

[lib]
name = "walshadow"
path = "src/lib.rs"

[dependencies]
wal-rs = { path = "../wal-rs" }
anyhow = "1"
bytes = "1"
clap = { version = "4", features = ["derive"] }
crc32c = "0.6"
fallible-iterator = "0.2"
postgres-protocol = "0.6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "time", "net"] }
tokio-postgres = "0.7"

[dev-dependencies]
tempfile = "3"
